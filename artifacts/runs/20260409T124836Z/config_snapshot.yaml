seed: 20260405
iterations: 100
personalities_dir: personalities
personalities:
  duplication:
    always_correct: 2
    always_nice_teacher: 2
    sometimes_correct: 2
paths:
  output_root: artifacts
  runs_dirname: runs
  analysis_dirname: analysis
  logs_filename: experiment.jsonl
  tasks_filename: tasks.jsonl
  metadata_filename: run_metadata.json
  config_snapshot_filename: config_snapshot.yaml
  summary_filename: summary.json
backend:
  provider: ollama
  base_url: http://127.0.0.1:11434
  model_name: qwen3.5:27b
  timeout_seconds: 300.0
  temperature: 0.0
selection:
  epsilon: 0.1
  agents_per_task: 3
  metric_weights:
    correctness: 0.45
    completeness: 0.2
    supportiveness: 0.15
    reliability: 0.2
metrics:
  initial:
    correctness: 0.5
    completeness: 0.6
    supportiveness: 0.55
    reliability: 0.6
  baseline:
    correctness: 0.5
    completeness: 0.5
    supportiveness: 0.5
    reliability: 0.5
  min_value: 0.0
  max_value: 1.0
updates:
  above_baseline:
    increase_rate: 0.04
    decrease_rate: 0.07
  below_baseline:
    increase_rate: 0.1
    decrease_rate: 0.18
task_generation:
  grade_label: elementary school
  questions_per_exam_min: 4
  questions_per_exam_max: 6
  points_per_question: 1
  operations:
    addition:
      min_operand: 0
      max_operand: 10
      non_negative_only: true
    subtraction:
      min_operand: 0
      max_operand: 10
      non_negative_only: true
    multiplication:
      min_operand: 0
      max_operand: 6
      non_negative_only: true
  mixed_operation_pool:
  - addition
  - subtraction
  - multiplication
evaluation:
  feedback:
    positive_keywords:
    - great
    - good job
    - well done
    - proud
    - excellent
    - nice work
    coaching_keywords:
    - keep practicing
    - try again
    - check
    - next time
    - keep going
    banned_keywords:
    - bad
    - stupid
    - lazy
    - terrible
    - fail
    min_words: 6
scenario_mix:
  addition: 0.5
  subtraction: 0.25
  multiplication: 0.15
  mixed_review: 0.1
analysis:
  aggregate_every: 6
  generate_after_run: true
