seed: 20260405
iterations: 16
personalities_dir: personalities
personalities:
  duplication:
    always_correct: 1
    always_nice_teacher: 1
    sometimes_correct: 1
paths:
  output_root: artifacts
  runs_dirname: runs
  analysis_dirname: analysis
  logs_filename: experiment.jsonl
  config_snapshot_filename: config_snapshot.yaml
  summary_filename: summary.json
backend:
  provider: ollama
  base_url: http://127.0.0.1:11434
  model_name: qwen3.5:9b
  timeout_seconds: 300.0
  temperature: 0.0
selection:
  epsilon: 0.10
  agents_per_task: 2
  metric_weights:
    correctness: 0.45
    completeness: 0.20
    supportiveness: 0.15
    reliability: 0.20
metrics:
  initial:
    correctness: 0.50
    completeness: 0.60
    supportiveness: 0.55
    reliability: 0.60
  baseline:
    correctness: 0.50
    completeness: 0.50
    supportiveness: 0.50
    reliability: 0.50
  min_value: 0.0
  max_value: 1.0
updates:
  above_baseline:
    increase_rate: 0.04
    decrease_rate: 0.07
  below_baseline:
    increase_rate: 0.10
    decrease_rate: 0.18
task_generation:
  grade_label: elementary school
  questions_per_exam_min: 4
  questions_per_exam_max: 5
  points_per_question: 1
  operations:
    addition:
      min_operand: 0
      max_operand: 12
      non_negative_only: true
    subtraction:
      min_operand: 0
      max_operand: 12
      non_negative_only: true
    multiplication:
      min_operand: 0
      max_operand: 10
      non_negative_only: true
  mixed_operation_pool: [addition, subtraction, multiplication]
evaluation:
  feedback:
    positive_keywords: [great, good job, well done, proud, excellent, nice work]
    coaching_keywords: [keep practicing, try again, check, next time, keep going]
    banned_keywords: [bad, stupid, lazy, terrible, fail]
    min_words: 6
scenario_mix:
  addition: 0.45
  subtraction: 0.25
  multiplication: 0.15
  mixed_review: 0.15
analysis:
  aggregate_every: 4
  generate_after_run: true
